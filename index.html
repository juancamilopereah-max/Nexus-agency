<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Agency · World</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#08080f; overflow:hidden; font-family:'Segoe UI',sans-serif; }
#game-container { position:fixed; inset:0; }
canvas { display:block; }

/* ── CHAT PANEL ── */
#chat-panel {
  position:fixed; right:-420px; top:0; bottom:0; width:400px;
  background:#0d0d18; border-left:2px solid rgba(108,99,255,.4);
  display:flex; flex-direction:column; z-index:100;
  transition:right .4s cubic-bezier(.16,1,.3,1);
  box-shadow:-8px 0 40px rgba(0,0,0,.6);
}
#chat-panel.open { right:0; }

#chat-header {
  padding:14px 16px; border-bottom:1px solid rgba(255,255,255,.07);
  display:flex; align-items:center; gap:12px; background:#13131f;
  flex-shrink:0;
}
#chat-agent-icon { font-size:1.6rem; }
#chat-agent-name { font-family:'Segoe UI',sans-serif; font-size:.95rem; font-weight:700; color:#fff; flex:1; }
#chat-agent-role { font-size:.72rem; color:rgba(255,255,255,.4); margin-top:.1rem; }
#chat-close {
  background:none; border:1px solid rgba(255,255,255,.12); color:rgba(255,255,255,.4);
  font-size:.65rem; padding:.3rem .7rem; cursor:pointer; letter-spacing:.1em;
}
#chat-close:hover { color:#fff; border-color:rgba(255,255,255,.3); }

#chat-quick { padding:8px 12px; border-bottom:1px solid rgba(255,255,255,.06); display:flex; gap:6px; flex-wrap:wrap; background:#13131f; flex-shrink:0; }
.qp-btn { padding:.3rem .7rem; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1); color:rgba(255,255,255,.5); font-size:.65rem; cursor:pointer; transition:all .15s; }
.qp-btn:hover { border-color:rgba(108,99,255,.4); color:rgba(168,156,255,.9); }

#chat-messages { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px; scrollbar-width:thin; scrollbar-color:rgba(255,255,255,.1) transparent; }
.msg { display:flex; flex-direction:column; gap:.3rem; }
.msg-name { font-size:.6rem; font-weight:700; letter-spacing:.15em; text-transform:uppercase; color:rgba(255,255,255,.3); }
.msg-bubble { padding:.8rem 1rem; font-size:.85rem; line-height:1.6; }
.msg.agent .msg-bubble { background:#16162a; border-left:2px solid; color:#e0deff; }
.msg.user .msg-bubble { background:rgba(108,99,255,.18); border:1px solid rgba(108,99,255,.3); color:#f0eef8; align-self:flex-end; max-width:85%; }
.msg.thinking .msg-bubble { opacity:.5; }

#chat-input-area { padding:12px; border-top:1px solid rgba(255,255,255,.07); display:flex; gap:8px; background:#13131f; flex-shrink:0; }
#chat-input {
  flex:1; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1);
  color:#f0eef8; font-size:.88rem; padding:.65rem .9rem; outline:none; transition:border-color .2s;
}
#chat-input:focus { border-color:rgba(108,99,255,.5); }
#chat-input::placeholder { color:rgba(255,255,255,.25); }
#chat-send {
  padding:.65rem 1.1rem; background:#6C63FF; border:none; color:#fff;
  font-size:.72rem; font-weight:700; letter-spacing:.1em; cursor:pointer; transition:background .2s;
}
#chat-send:hover { background:#7b73ff; }
#chat-send:disabled { opacity:.4; cursor:not-allowed; }

/* ── HUD ── */
#hud {
  position:fixed; top:16px; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:8px; z-index:50;
  background:rgba(8,8,15,.85); border:1px solid rgba(108,99,255,.25);
  padding:8px 20px; backdrop-filter:blur(8px);
}
.hud-logo { font-size:.8rem; font-weight:700; letter-spacing:.2em; color:#A89CFF; text-transform:uppercase; }
.hud-sep { color:rgba(255,255,255,.15); }
.hud-hint { font-size:.65rem; color:rgba(255,255,255,.35); letter-spacing:.05em; }

/* ── AGENT TOOLTIP ── */
#agent-tooltip {
  position:fixed; pointer-events:none; z-index:200;
  background:rgba(13,13,24,.95); border:1px solid rgba(108,99,255,.35);
  padding:8px 14px; display:none;
}
#agent-tooltip .tt-name { font-size:.8rem; font-weight:700; color:#fff; }
#agent-tooltip .tt-status { font-size:.65rem; color:rgba(255,255,255,.4); margin-top:.2rem; }

/* ── DASHBOARD BTN ── */
#dash-btn {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:rgba(8,8,15,.9); border:1px solid rgba(108,99,255,.3);
  color:#A89CFF; font-size:.7rem; font-weight:700; letter-spacing:.2em;
  text-transform:uppercase; padding:.55rem 1.4rem; cursor:pointer; z-index:50;
  transition:all .2s;
}
#dash-btn:hover { background:rgba(108,99,255,.15); border-color:rgba(108,99,255,.5); }
</style>
</head>
<body>

<div id="game-container"><canvas id="world"></canvas></div>

<!-- HUD -->
<div id="hud">
  <span class="hud-logo">Nexus Agency</span>
  <span class="hud-sep">·</span>
  <span class="hud-hint">Haz clic en un agente para consultar</span>
</div>

<!-- Tooltip -->
<div id="agent-tooltip">
  <div class="tt-name" id="tt-name">Agente</div>
  <div class="tt-status" id="tt-status">Disponible</div>
</div>

<!-- Dashboard button -->
<button id="dash-btn" onclick="window.open('/dashboard.html','nexus-dashboard')">📊 Abrir Dashboard</button>

<!-- Chat Panel -->
<div id="chat-panel">
  <div id="chat-header">
    <span id="chat-agent-icon">🧠</span>
    <div>
      <div id="chat-agent-name">Agente</div>
      <div id="chat-agent-role">Especialista IA</div>
    </div>
    <button id="chat-close" onclick="closeChat()">✕ CERRAR</button>
  </div>
  <div id="chat-quick"></div>
  <div id="chat-messages"></div>
  <div id="chat-input-area">
    <input id="chat-input" placeholder="Escribe tu mensaje…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"/>
    <button id="chat-send" onclick="sendMsg()">ENVIAR →</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
//   NEXUS AGENCY · ISOMETRIC WORLD ENGINE
// ════════════════════════════════════════════════════

const canvas = document.getElementById('world');
const ctx = canvas.getContext('2d');

// ── Config ──
const TW = 64, TH = 32; // tile width/height
const GRID_W = 26, GRID_H = 22;
let originX, originY;
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  originX = W / 2;
  originY = H * 0.18;
}
resize();
window.addEventListener('resize', resize);

// ── Iso conversions ──
function toIso(gx, gy) {
  return {
    x: originX + (gx - gy) * TW / 2,
    y: originY + (gx + gy) * TH / 2
  };
}
function fromIso(sx, sy) {
  const dx = sx - originX, dy = sy - originY;
  return {
    x: Math.floor((dx / (TW/2) + dy / (TH/2)) / 2),
    y: Math.floor((dy / (TH/2) - dx / (TW/2)) / 2)
  };
}

// ── Tile map ──
// 0 = floor, 1 = wall/blocked, 2 = carpet zone
const tileMap = [];
for (let y = 0; y < GRID_H; y++) {
  tileMap[y] = [];
  for (let x = 0; x < GRID_W; x++) {
    // Border walls
    if (x===0||y===0||x===GRID_W-1||y===GRID_H-1) tileMap[y][x] = 1;
    else tileMap[y][x] = 0;
  }
}

// Zone definitions
const ZONES = {
  strategy: { x1:2, y1:2, x2:8, y2:8, color:'#6C63FF', name:'Estrategia', icon:'🧠', deskX:4, deskY:3 },
  content:  { x1:18, y1:2, x2:24, y2:8, color:'#ff6b35', name:'Contenido', icon:'✍️', deskX:21, deskY:3 },
  sales:    { x1:2, y1:14, x2:8, y2:20, color:'#00cc88', name:'Ventas', icon:'💰', deskX:4, deskY:17 },
  analysis: { x1:18, y1:14, x2:24, y2:20, color:'#00ccff', name:'Análisis', icon:'📊', deskX:21, deskY:17 },
};

// Meeting area (center)
const MEETING = { x:11, y:9, w:4, h:4 };

// Furniture positions (blocked tiles)
const furniture = [];

// ── Agent definitions ──
const AGENTS = [
  { key:'strategy', name:'Agente de Estrategia', role:'Estrategia de lanzamiento', icon:'🧠',
    color:'#6C63FF', light:'#A89CFF', zone: ZONES.strategy,
    prompts:['¿Cuál es mi mayor riesgo?','Analiza mis métricas','Plan para el cierre','Detecta oportunidades'] },
  { key:'content', name:'Agente de Contenido', role:'Mensajes y guiones WA', icon:'✍️',
    color:'#ff6b35', light:'#ffaa88', zone: ZONES.content,
    prompts:['Mensajes de calentamiento','Adapta la invitación','Guión para el webinar','Ideas para el grupo'] },
  { key:'sales', name:'Agente de Ventas', role:'Cierre y objeciones', icon:'💰',
    color:'#00cc88', light:'#88ffcc', zone: ZONES.sales,
    prompts:['¿Cómo manejo esta objeción?','Script de cierre','Alguien que dice "lo pienso"','¿Por qué no cierro?'] },
  { key:'analysis', name:'Agente de Análisis', role:'Datos y proyecciones', icon:'📊',
    color:'#00ccff', light:'#88eeff', zone: ZONES.analysis,
    prompts:['Analiza mis números','¿Dónde pierdo leads?','Proyecta las ventas finales','¿Qué KPI mejorar?'] },
];

// ── A* Pathfinding ──
function heuristic(a, b) {
  return Math.abs(a.x - b.x) + Math.abs(a.y - b.y);
}

function isWalkable(x, y) {
  if (x < 0 || y < 0 || x >= GRID_W || y >= GRID_H) return false;
  return tileMap[y][x] !== 1;
}

function findPath(startX, startY, endX, endY) {
  const open = [];
  const closed = new Set();
  const start = { x: startX, y: startY, g: 0, h: heuristic({x:startX,y:startY},{x:endX,y:endY}), parent: null };
  start.f = start.g + start.h;
  open.push(start);

  while (open.length > 0) {
    open.sort((a, b) => a.f - b.f);
    const current = open.shift();
    const key = `${current.x},${current.y}`;
    if (closed.has(key)) continue;
    closed.add(key);

    if (current.x === endX && current.y === endY) {
      const path = [];
      let node = current;
      while (node) { path.unshift({ x: node.x, y: node.y }); node = node.parent; }
      return path;
    }

    const dirs = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1},{x:1,y:1},{x:-1,y:-1},{x:1,y:-1},{x:-1,y:1}];
    for (const d of dirs) {
      const nx = current.x + d.x, ny = current.y + d.y;
      if (!isWalkable(nx, ny) || closed.has(`${nx},${ny}`)) continue;
      const g = current.g + (d.x !== 0 && d.y !== 0 ? 1.4 : 1);
      const h = heuristic({x:nx,y:ny},{x:endX,y:endY});
      open.push({ x:nx, y:ny, g, h, f:g+h, parent:current });
    }
  }
  return [];
}

// ── Agent class ──
class Agent {
  constructor(data) {
    Object.assign(this, data);
    this.gx = data.zone.deskX;
    this.gy = data.zone.deskY;
    this.px = this.gx; // precise x for smooth movement
    this.py = this.gy;
    this.path = [];
    this.pathIndex = 0;
    this.state = 'idle'; // idle, walking, meeting, returning
    this.stateTimer = Math.random() * 120 + 60; // frames until next action
    this.bobOffset = 0;
    this.bobDir = 1;
    this.facing = 'se'; // se, sw, ne, nw, s, n, e, w
    this.alpha = 1;
    this.selected = false;
    this.isBeingConsulted = false;
    this.chatHistory = [];
  }

  update(dt) {
    // Bob animation
    this.bobOffset += this.bobDir * 0.04;
    if (Math.abs(this.bobOffset) > 1.5) this.bobDir *= -1;

    if (this.isBeingConsulted) return;

    if (this.path.length > 0 && this.pathIndex < this.path.length) {
      // Moving along path
      const target = this.path[this.pathIndex];
      const dx = target.x - this.px;
      const dy = target.y - this.py;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const speed = 0.06;

      // Update facing direction
      if (Math.abs(dx) > 0.01 || Math.abs(dy) > 0.01) {
        if (dx > 0.1 && dy < -0.1) this.facing = 'ne';
        else if (dx < -0.1 && dy > 0.1) this.facing = 'sw';
        else if (dx > 0.1 && dy > 0.1) this.facing = 'se';
        else if (dx < -0.1 && dy < -0.1) this.facing = 'nw';
        else if (dx > 0.1) this.facing = 'e';
        else if (dx < -0.1) this.facing = 'w';
        else if (dy > 0.1) this.facing = 's';
        else if (dy < -0.1) this.facing = 'n';
      }

      if (dist < speed) {
        this.px = target.x;
        this.py = target.y;
        this.gx = target.x;
        this.gy = target.y;
        this.pathIndex++;
      } else {
        this.px += (dx / dist) * speed;
        this.py += (dy / dist) * speed;
      }
      return;
    }

    // Path finished
    if (this.path.length > 0) {
      this.path = [];
      this.pathIndex = 0;
      if (this.state === 'walking') {
        this.state = 'meeting';
        this.stateTimer = Math.random() * 200 + 150;
      } else if (this.state === 'returning') {
        this.state = 'idle';
        this.stateTimer = Math.random() * 300 + 200;
      }
    }

    // State machine
    this.stateTimer--;
    if (this.stateTimer <= 0) {
      if (this.state === 'idle') {
        // Walk to meeting area
        const mx = MEETING.x + Math.floor(Math.random() * MEETING.w);
        const my = MEETING.y + Math.floor(Math.random() * MEETING.h);
        this.path = findPath(Math.round(this.px), Math.round(this.py), mx, my);
        this.pathIndex = 0;
        this.state = 'walking';
      } else if (this.state === 'meeting') {
        // Walk back to desk
        this.path = findPath(Math.round(this.px), Math.round(this.py), this.zone.deskX, this.zone.deskY);
        this.pathIndex = 0;
        this.state = 'returning';
      }
    }
  }

  walkTo(x, y, callback) {
    this.path = findPath(Math.round(this.px), Math.round(this.py), x, y);
    this.pathIndex = 0;
    this.onArrival = callback;
    this.state = 'walking_to_user';
  }

  get screenPos() {
    return toIso(this.px, this.py);
  }

  get depth() { return this.px + this.py; }

  draw(ctx) {
    const pos = this.screenPos;
    const x = pos.x;
    const y = pos.y + this.bobOffset - 20;
    const c = this.color;
    const cl = this.light;

    ctx.save();
    if (this.selected) {
      ctx.shadowBlur = 20;
      ctx.shadowColor = c;
    }

    // Shadow on ground
    ctx.beginPath();
    ctx.ellipse(x, pos.y + 2, 12, 5, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fill();

    // Body (isometric style)
    // Legs
    ctx.fillStyle = this.darken(c, 0.6);
    ctx.fillRect(x - 5, y + 14, 4, 8);
    ctx.fillRect(x + 1, y + 14, 4, 8);

    // Torso
    ctx.fillStyle = c;
    ctx.fillRect(x - 7, y + 4, 14, 12);

    // Arms
    ctx.fillStyle = this.darken(c, 0.7);
    ctx.fillRect(x - 11, y + 5, 4, 9);
    ctx.fillRect(x + 7, y + 5, 4, 9);

    // Neck
    ctx.fillStyle = '#f5c5a3';
    ctx.fillRect(x - 2, y + 1, 4, 5);

    // Head
    ctx.fillStyle = '#f5c5a3';
    ctx.beginPath();
    ctx.ellipse(x, y - 2, 7, 8, 0, 0, Math.PI*2);
    ctx.fill();

    // Hair
    ctx.fillStyle = this.darken(c, 0.5);
    ctx.beginPath();
    ctx.ellipse(x, y - 5, 7, 5, 0, 0, Math.PI);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#1a1a2e';
    if (this.facing === 'sw' || this.facing === 'se' || this.facing === 's' || this.facing === 'e' || this.facing === 'w') {
      ctx.beginPath();
      ctx.ellipse(x - 3, y - 2, 1.5, 1.5, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(x + 3, y - 2, 1.5, 1.5, 0, 0, Math.PI*2);
      ctx.fill();
    }

    // Agent icon above head
    ctx.font = '12px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(this.icon, x, y - 18);

    // Name tag
    if (this.selected || this.isBeingConsulted) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      const tw = ctx.measureText(this.name).width + 12;
      ctx.fillRect(x - tw/2, y - 35, tw, 14);
      ctx.fillStyle = cl;
      ctx.font = 'bold 9px Arial';
      ctx.fillText(this.name, x, y - 24);
    }

    // Status dot
    const dotColor = this.isBeingConsulted ? '#FFD166' : this.state === 'meeting' ? '#ff6b6b' : '#4AAA72';
    ctx.beginPath();
    ctx.arc(x + 8, y + 4, 4, 0, Math.PI*2);
    ctx.fillStyle = dotColor;
    ctx.fill();
    ctx.strokeStyle = '#0d0d18';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.restore();
  }

  darken(hex, factor) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgb(${Math.floor(r*factor)},${Math.floor(g*factor)},${Math.floor(b*factor)})`;
  }

  hitTest(mx, my) {
    const pos = this.screenPos;
    const ax = pos.x, ay = pos.y + this.bobOffset - 20;
    return mx > ax - 14 && mx < ax + 14 && my > ay - 12 && my < ay + 24;
  }
}

// Create agents
const agents = AGENTS.map(d => new Agent(d));

// ── Drawing functions ──
function drawTile(gx, gy, fillColor, strokeColor='rgba(255,255,255,0.06)', elevated=false) {
  const p = toIso(gx, gy);
  const x = p.x, y = p.y - (elevated ? TH/2 : 0);
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + TW/2, y + TH/2);
  ctx.lineTo(x, y + TH);
  ctx.lineTo(x - TW/2, y + TH/2);
  ctx.closePath();
  ctx.fillStyle = fillColor;
  ctx.fill();
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth = 0.5;
  ctx.stroke();
}

function drawBlock(gx, gy, topColor, leftColor, rightColor, height=TH) {
  const p = toIso(gx, gy);
  const x = p.x, y = p.y;
  const h = height;

  // Top face
  ctx.beginPath();
  ctx.moveTo(x, y - h);
  ctx.lineTo(x + TW/2, y + TH/2 - h);
  ctx.lineTo(x, y + TH - h);
  ctx.lineTo(x - TW/2, y + TH/2 - h);
  ctx.closePath();
  ctx.fillStyle = topColor;
  ctx.fill();

  // Left face
  ctx.beginPath();
  ctx.moveTo(x - TW/2, y + TH/2 - h);
  ctx.lineTo(x, y + TH - h);
  ctx.lineTo(x, y + TH);
  ctx.lineTo(x - TW/2, y + TH/2);
  ctx.closePath();
  ctx.fillStyle = leftColor;
  ctx.fill();

  // Right face
  ctx.beginPath();
  ctx.moveTo(x + TW/2, y + TH/2 - h);
  ctx.lineTo(x, y + TH - h);
  ctx.lineTo(x, y + TH);
  ctx.lineTo(x + TW/2, y + TH/2);
  ctx.closePath();
  ctx.fillStyle = rightColor;
  ctx.fill();

  // Outline
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 0.5;
  ctx.stroke();
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}
function darkenHex(hex, f) {
  const {r,g,b} = hexToRgb(hex);
  return `rgb(${Math.floor(r*f)},${Math.floor(g*f)},${Math.floor(b*f)})`;
}
function alphaHex(hex, a) {
  const {r,g,b} = hexToRgb(hex);
  return `rgba(${r},${g},${b},${a})`;
}

function drawDesk(gx, gy, color) {
  // Desk top
  drawBlock(gx, gy, darkenHex(color, 0.4), darkenHex(color, 0.25), darkenHex(color, 0.3), TH * 0.7);
  // Computer monitor
  const p = toIso(gx, gy);
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(p.x - 6, p.y - TH*0.7 - 14, 12, 10);
  ctx.fillStyle = alphaHex(color, 0.6);
  ctx.fillRect(p.x - 5, p.y - TH*0.7 - 13, 10, 8);
  ctx.fillStyle = '#0d0d18';
  ctx.fillRect(p.x - 1, p.y - TH*0.7 - 4, 2, 4);
}

function drawChair(gx, gy, color) {
  const p = toIso(gx, gy);
  ctx.fillStyle = darkenHex(color, 0.5);
  ctx.beginPath();
  ctx.ellipse(p.x, p.y - 6, 8, 4, 0, 0, Math.PI*2);
  ctx.fill();
}

function drawMeetingTable() {
  const cx = MEETING.x + MEETING.w/2, cy = MEETING.y + MEETING.h/2;
  for (let dx = 0; dx < MEETING.w; dx++) {
    for (let dy = 0; dy < MEETING.h; dy++) {
      if ((dx===1||dx===2) && (dy===1||dy===2)) {
        drawBlock(MEETING.x+dx, MEETING.y+dy, '#1a1830', '#111124', '#131220', TH*0.5);
      }
    }
  }
  // Table surface light
  const p = toIso(cx, cy);
  ctx.beginPath();
  ctx.ellipse(p.x, p.y - 8, 24, 12, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(108,99,255,0.15)';
  ctx.fill();
}

function drawZoneLabel(zone) {
  const cx = (zone.x1 + zone.x2) / 2;
  const cy = (zone.y1 + zone.y2) / 2;
  const p = toIso(cx, cy);
  ctx.save();
  ctx.font = 'bold 11px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = alphaHex(zone.color, 0.6);
  ctx.fillText(zone.icon + ' ' + zone.name.toUpperCase(), p.x, p.y - 2);
  ctx.restore();
}

// ── Render all tiles ──
function renderWorld() {
  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W*0.7);
  grad.addColorStop(0, '#0f0f1e');
  grad.addColorStop(1, '#08080f');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Collect all drawables by depth for correct isometric sorting
  const drawables = [];

  // ── Tiles ──
  for (let y = 0; y < GRID_H; y++) {
    for (let x = 0; x < GRID_W; x++) {
      if (tileMap[y][x] === 1) continue;

      // Determine tile color
      let tileColor = '#0e0e1c';
      let strokeColor = 'rgba(255,255,255,0.04)';

      // Zone carpet
      for (const z of Object.values(ZONES)) {
        if (x >= z.x1 && x <= z.x2 && y >= z.y1 && y <= z.y2) {
          tileColor = alphaHex(z.color, 0.12);
          strokeColor = alphaHex(z.color, 0.15);
          break;
        }
      }

      // Meeting area
      if (x >= MEETING.x && x < MEETING.x+MEETING.w && y >= MEETING.y && y < MEETING.y+MEETING.h) {
        tileColor = 'rgba(108,99,255,0.08)';
        strokeColor = 'rgba(108,99,255,0.12)';
      }

      drawables.push({ depth: x+y+0.1, type:'tile', x, y, tileColor, strokeColor });
    }
  }

  // ── Walls ──
  for (let x = 0; x < GRID_W; x++) {
    drawables.push({ depth: x+0+0.5, type:'wall', x, y:0, dir:'top' });
    drawables.push({ depth: x+(GRID_H-1)+0.5, type:'wall', x, y:GRID_H-1, dir:'bottom' });
  }
  for (let y = 1; y < GRID_H-1; y++) {
    drawables.push({ depth: 0+y+0.5, type:'wall', x:0, y, dir:'left' });
    drawables.push({ depth: (GRID_W-1)+y+0.5, type:'wall', x:GRID_W-1, y, dir:'right' });
  }

  // ── Furniture ──
  for (const z of Object.values(ZONES)) {
    drawables.push({ depth: z.deskX + z.deskY + 0.8, type:'desk', x:z.deskX, y:z.deskY, color:z.color });
    drawables.push({ depth: z.deskX + (z.deskY+1) + 0.7, type:'chair', x:z.deskX, y:z.deskY+1, color:z.color });
  }
  // Meeting table
  drawables.push({ depth: MEETING.x+MEETING.w/2 + MEETING.y+MEETING.h/2 + 0.9, type:'meeting' });

  // ── Agents ──
  for (const agent of agents) {
    drawables.push({ depth: agent.px + agent.py + 1, type:'agent', agent });
  }

  // Sort by depth
  drawables.sort((a, b) => a.depth - b.depth);

  // Draw all
  for (const d of drawables) {
    switch(d.type) {
      case 'tile':
        drawTile(d.x, d.y, d.tileColor, d.strokeColor);
        break;
      case 'wall': {
        const wallColor = '#13131f';
        drawBlock(d.x, d.y, '#1a1a2e', '#111124', '#131220', TH);
        break;
      }
      case 'desk':
        drawDesk(d.x, d.y, d.color);
        break;
      case 'chair':
        drawChair(d.x, d.y, d.color);
        break;
      case 'meeting':
        drawMeetingTable();
        break;
      case 'agent':
        d.agent.draw(ctx);
        break;
    }
  }

  // Zone labels (on top)
  for (const z of Object.values(ZONES)) {
    drawZoneLabel(z);
  }

  // Center label
  const cp = toIso(MEETING.x + MEETING.w/2, MEETING.y + MEETING.h/2);
  ctx.save();
  ctx.font = 'bold 10px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(108,99,255,0.5)';
  ctx.fillText('🏛 SALA DE REUNIONES', cp.x, cp.y - 20);
  ctx.restore();
}

// ── GAME LOOP ──
let lastTime = 0;
function loop(ts) {
  const dt = ts - lastTime;
  lastTime = ts;

  for (const agent of agents) {
    agent.update(dt);
    // Check arrival callback
    if (agent.onArrival && agent.path.length > 0 && agent.pathIndex >= agent.path.length) {
      const cb = agent.onArrival;
      agent.onArrival = null;
      cb();
    }
  }

  renderWorld();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── INTERACTION ──
let hoveredAgent = null;
const tooltip = document.getElementById('agent-tooltip');

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  hoveredAgent = null;
  for (const agent of agents) {
    if (agent.hitTest(mx, my)) {
      hoveredAgent = agent;
      canvas.style.cursor = 'pointer';
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
      document.getElementById('tt-name').textContent = agent.icon + ' ' + agent.name;
      document.getElementById('tt-status').textContent =
        agent.isBeingConsulted ? '💬 En consulta' :
        agent.state === 'meeting' ? '🏛 En reunión' :
        agent.state === 'idle' || agent.state === 'returning' ? '✅ Disponible' : '🚶 Caminando';
      break;
    }
  }

  if (!hoveredAgent) {
    canvas.style.cursor = 'default';
    tooltip.style.display = 'none';
  }
});

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  for (const agent of agents) {
    if (agent.hitTest(mx, my)) {
      openAgentChat(agent);
      return;
    }
  }
});

canvas.addEventListener('mouseleave', () => {
  tooltip.style.display = 'none';
});

// ── CHAT SYSTEM ──
let activeAgent = null;
let aiConversation = [];

function openAgentChat(agent) {
  if (activeAgent) {
    activeAgent.isBeingConsulted = false;
    activeAgent.selected = false;
  }

  activeAgent = agent;
  agent.isBeingConsulted = true;
  agent.selected = true;
  aiConversation = agent.chatHistory || [];

  // Update panel
  document.getElementById('chat-agent-icon').textContent = agent.icon;
  document.getElementById('chat-agent-name').textContent = agent.name;
  document.getElementById('chat-agent-role').style.color = agent.light;
  document.getElementById('chat-agent-role').textContent = agent.role;
  document.getElementById('chat-panel').style.borderLeftColor = agent.color;
  document.getElementById('chat-send').style.background = agent.color;

  // Quick prompts
  document.getElementById('chat-quick').innerHTML = agent.prompts.map(p =>
    `<button class="qp-btn" onclick="quickPrompt('${p.replace(/'/g,"\\'")}')">⚡ ${p}</button>`
  ).join('');

  // Render history or greeting
  const messagesEl = document.getElementById('chat-messages');
  if (aiConversation.length === 0) {
    messagesEl.innerHTML = '';
    addMsg('agent', `${agent.icon} ${agent.name} conectado. ¿En qué puedo ayudarte hoy?`);
  } else {
    messagesEl.innerHTML = '';
    aiConversation.forEach(m => {
      if (m.role === 'user') addMsg('user', m.content, false);
      else addMsg('agent', m.content, false);
    });
  }

  document.getElementById('chat-panel').classList.add('open');

  // Agent walks toward center/entrance
  agent.path = findPath(Math.round(agent.px), Math.round(agent.py), 13, 10);
  agent.pathIndex = 0;
  agent.state = 'walking_to_user';

  setTimeout(() => document.getElementById('chat-input').focus(), 400);
}

function closeChat() {
  if (activeAgent) {
    activeAgent.isBeingConsulted = false;
    activeAgent.selected = false;
    // Walk back to desk
    activeAgent.path = findPath(Math.round(activeAgent.px), Math.round(activeAgent.py), activeAgent.zone.deskX, activeAgent.zone.deskY);
    activeAgent.pathIndex = 0;
    activeAgent.state = 'returning';
    activeAgent = null;
  }
  document.getElementById('chat-panel').classList.remove('open');
}

function addMsg(role, text, scroll=true) {
  const el = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const name = role === 'agent' ? (activeAgent ? activeAgent.name : 'Agente') : 'Tú';
  const color = role === 'agent' && activeAgent ? activeAgent.color : '#6C63FF';
  div.innerHTML = `
    <div class="msg-name" style="color:${role==='agent'?color:'rgba(255,255,255,.3)'}">${name}</div>
    <div class="msg-bubble" ${role==='agent'?`style="border-color:${color}40"`:''}>${text.replace(/\n/g,'<br>')}</div>`;
  el.appendChild(div);
  if (scroll) el.scrollTop = el.scrollHeight;
  return div;
}

function quickPrompt(text) {
  document.getElementById('chat-input').value = text;
  sendMsg();
}

async function sendMsg() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !activeAgent) return;
  input.value = '';
  document.getElementById('chat-send').disabled = true;

  addMsg('user', text);
  aiConversation.push({ role: 'user', content: text });

  const thinking = addMsg('agent', '…');
  thinking.classList.add('thinking');

  try {
    // Try /api/chat first (if deployed on Vercel with auth)
    const messages = [
      { role: 'user', content: `CONTEXTO: Eres ${activeAgent.name} en Nexus Agency.\n\n${aiConversation[0].content}` },
      ...aiConversation.slice(1)
    ];

    let reply = '';
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: getAgentSystem(activeAgent.key) + '\n\nResponde siempre en español. Sé concreto y accionable.',
          messages
        })
      });
      if (res.ok) {
        const data = await res.json();
        reply = data.content?.[0]?.text || '';
      }
    } catch(e) {}

    if (!reply) {
      reply = `Hola! Soy ${activeAgent.name}. Para usar los agentes de IA con contexto completo, abre el Dashboard → Agentes IA. Aquí estoy en modo visual.`;
    }

    aiConversation.push({ role: 'assistant', content: reply });
    if (activeAgent) activeAgent.chatHistory = [...aiConversation];

    thinking.querySelector('.msg-bubble').innerHTML = reply.replace(/\n/g,'<br>');
    thinking.classList.remove('thinking');
    document.getElementById('chat-messages').scrollTop = 99999;

  } catch(e) {
    thinking.querySelector('.msg-bubble').textContent = '⚠ Error de conexión.';
    thinking.classList.remove('thinking');
  }

  document.getElementById('chat-send').disabled = false;
}

function getAgentSystem(key) {
  const systems = {
    strategy: 'Eres el Agente de Estrategia de Nexus Agency. Experto en estrategia de lanzamientos digitales y marketing de respuesta directa.',
    content: 'Eres el Agente de Contenido de Nexus Agency. Especializas en crear mensajes de WhatsApp auténticos y persuasivos.',
    sales: 'Eres el Agente de Ventas de Nexus Agency. Experto en cierre de ventas de alto ticket y manejo de objeciones.',
    analysis: 'Eres el Agente de Análisis de Nexus Agency. Experto en métricas de lanzamiento y optimización basada en datos.',
  };
  return systems[key] || 'Eres un agente de IA de Nexus Agency.';
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeChat();
});
